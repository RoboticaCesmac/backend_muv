# Fase 1: Setup
[phases.setup]
nixPkgs = [
  "python3Packages.supervisor",
  "php83",
  "php83Packages.composer",
  "nodejs_20",
  "nginx"
]

# Fase 2: Build
[phases.build]
cmds = [
  # 1. Instala dependências
  "composer install --no-dev --ignore-platform-reqs",
  "npm ci",
  
  # 2. Builda os assets
  "npm run build",
  
  # 3. Cria os diretórios
  "mkdir -p /etc/supervisor/conf.d/",
  "mkdir -p /etc/nginx/",
  
  # 4. Copia os arquivos de configuração
  "cp /assets/supervisord.conf /etc/supervisord.conf",
  "cp /assets/php-fpm.conf /etc/php-fpm.conf",
  "cp /assets/nginx.conf /etc/nginx/nginx.conf",
  "cp /assets/fastcgi_params /etc/nginx/fastcgi_params",
  
  # <<< ADICIONE ESTA LINHA AQUI >>>
  "cp /assets/mime.types /etc/nginx/mime.types",
  
  "cp /assets/worker-nginx.conf /etc/supervisor/conf.d/",
  "cp /assets/worker-phpfpm.conf /etc/supervisor/conf.d/",
  "cp /assets/worker-laravel.conf /etc/supervisor/conf.d/"
]

# Fase 3: Start
[start]
cmd = "php /app/artisan config:cache && php /app/artisan route:cache && php /app/artisan view:cache && php /app/artisan migrate --force && supervisord -c /etc/supervisord.conf -n"

# --- Definição de Todos os Nossos Arquivos de Configuração ---
[staticAssets]

# 1. Configuração principal do Supervisor (<<< MODIFICADA >>>)
"supervisord.conf" = """
[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout            ; <--- MUDADO (Para vermos os logs!)
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[include]
files = /etc/supervisor/conf.d/*.conf
"""

# 2. Configuração do PHP-FPM (<<< MODIFICADA >>>)
"php-fpm.conf" = """
[global]
pid = /tmp/php-fpm.pid
error_log = /dev/stderr
daemonize = no

[www]
listen = 127.0.0.1:9000
user = root
group = root
listen.owner = root
listen.group = root
pm = dynamic
pm.max_children = 10
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.start_servers = 3
clear_env = no

; Log para o stdout do supervisor
catch_workers_output = yes
"""

# 3. Configuração do Nginx (Sem mudanças)
"nginx.conf" = """
user root root;
worker_processes 4;
pid /tmp/nginx.pid;
events {
  worker_connections  4096;
}
http {
  include       /etc/nginx/mime.types;
  index         index.html index.htm index.php;
  default_type application/octet-stream;
  log_format    main '$remote_addr - $remote_user [$time_local]  $status '
      '"$request" $body_bytes_sent "$http_referer" '
      '"$http_user_agent" "$http_x_forwarded_for"';
  
  access_log /dev/stdout main;
  error_log /dev/stderr;
  
  sendfile        on;
  tcp_nopush      on;
  server_names_hash_bucket_size 128;
  server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /app/public; 
    add_header X-Content-Type-Options "nosniff";
    client_max_body_size 35M;
    index index.php;
    charset utf-8;
    location / {
      try_files $uri $uri/ /index.php?$query_string;
    }
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    error_page 404 /index.php;
    location ~ \\.php$ {
      fastcgi_pass 127.0.0.1:9000;
      fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
      include /etc/nginx/fastcgi_params;
    }
    location ~ /\\.(?!well-known).* {
      deny all;
    }
  }
}
"""

# 4. fastcgi_params (Sem mudanças)
"fastcgi_params" = """
fastcgi_param  QUERY_STRING       $query_string;
fastcgi_param  REQUEST_METHOD     $request_method;
fastcgi_param  CONTENT_TYPE       $content_type;
fastcgi_param  CONTENT_LENGTH     $content_length;
fastcgi_param  SCRIPT_NAME        $fastcgi_script_name;
fastcgi_param  REQUEST_URI        $request_uri;
fastcgi_param  DOCUMENT_URI       $document_uri;
fastcgi_param  DOCUMENT_ROOT      $document_root;
fastcgi_param  SERVER_PROTOCOL    $server_protocol;
fastcgi_param  REQUEST_SCHEME     $scheme;
fastcgi_param  HTTPS              $https if_not_empty;
fastcgi_param  GATEWAY_INTERFACE  CGI/1.1;
fastcgi_param  SERVER_SOFTWARE    nginx/$nginx_version;
fastcgi_param  REMOTE_ADDR        $remote_addr;
fastcgi_param  REMOTE_PORT        $remote_port;
fastcgi_param  SERVER_ADDR        $server_addr;
fastcgi_param  SERVER_PORT        $server_port;
fastcgi_param  SERVER_NAME        $server_name;
fastcgi_param  REDIRECT_STATUS    200;
fastcgi_param  SCRIPT_FILENAME    $document_root$fastcgi_script_name;
"""

# 5. <<< NOVO ARQUIVO ADICIONADO >>>
