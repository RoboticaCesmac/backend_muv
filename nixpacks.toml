# 6. Worker do Supervisor para o Nginx (<<< MODIFICADO >>>)
# Redireciona logs para o stdout/stderr do supervisor
"worker-nginx.conf" = """
[program:nginx]
command=nginx -g 'daemon off;' -c /etc/nginx/nginx.conf
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
"""

# 7. Worker do Supervisor para o PHP-FPM (<<< MODIFICADO >>>)
"worker-phpfpm.conf" = """
[program:php-fpm]
command=php-fpm -y /etc/php-fpm.conf -F
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
"""

# 8. Worker do Supervisor para as Queues do Laravel (<<< MODIFICADO >>>)
"worker-laravel.conf" = """
[program:worker-laravel]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work --sleep=3 --tries=3
autostart=true
autorestart=true
numprocs=4
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
"""