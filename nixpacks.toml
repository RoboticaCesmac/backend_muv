# Fase 1: Setup
[phases.setup]
nixPkgs = [
  "python3Packages.supervisor",
  "php83",
  "php83Packages.composer",
  "nodejs_20",
  "nginx"
]

# Fase 2: Build
[phases.build]
cmds = [
  # 1. Instala dependências
  "composer install --no-dev --ignore-platform-reqs",
  "npm ci",
  
  # 2. Builda os assets
  "npm run build",
  
  # 3. Cria os diretórios
  "mkdir -p /etc/supervisor/conf.d/",
  "mkdir -p /etc/nginx/",
  
  # 4. Copia os arquivos de configuração
  "cp /assets/supervisord.conf /etc/supervisord.conf",
  "cp /assets/php-fpm.conf /etc/php-fpm.conf",
  "cp /assets/nginx.conf /etc/nginx/nginx.conf",
  
  "cp /assets/fastcgi_params /etc/nginx/fastcgi_params",
  
  "cp /assets/worker-nginx.conf /etc/supervisor/conf.d/",
  "cp /assets/worker-phpfpm.conf /etc/supervisor/conf.d/",
  "cp /assets/worker-laravel.conf /etc/supervisor/conf.d/"
]

# Fase 3: Start
[start]
cmd = "php /app/artisan config:cache && php /app/artisan route:cache && php /app/artisan view:cache && php /app/artisan migrate --force && supervisord -c /etc/supervisord.conf -n"

# --- Definição de Todos os Nossos Arquivos de Configuração ---
[staticAssets]

# 1. Configuração principal do Supervisor (Corrigida)
"supervisord.conf" = """
[supervisord]
nodaemon=true
user=root                    ; <--- ADICIONADO (remove o log CRIT)
logfile=/dev/null            ; <--- MUDADO (não escreve log)
logfile_maxbytes=0           ; <--- MUDADO
pidfile=/tmp/supervisord.pid ; <--- MUDADO (usa /tmp)

[include]
files = /etc/supervisor/conf.d/*.conf
"""

# 2. Configuração do PHP-FPM (Sem mudanças, já estava ok)
"php-fpm.conf" = """
[www]
listen = 127.0.0.1:9000
user = root
group = root
listen.owner = root
listen.group = root
pm = dynamic
pm.max_children = 10
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.start_servers = 3
clear_env = no
"""

# 3. Configuração do Nginx (Corrigida)
"nginx.conf" = """
user root root;
worker_processes 4;
pid /tmp/nginx.pid;           ; <--- MUDADO (usa /tmp)
events {
  worker_connections  4096;
}
http {
  include       /etc/nginx/mime.types;
  index         index.html index.htm index.php;
  default_type application/octet-stream;
  log_format    main '$remote_addr - $remote_user [$time_local]  $status '
      '"$request" $body_bytes_sent "$http_referer" '
      '"$http_user_agent" "$http_x_forwarded_for"';
  
  access_log /dev/stdout main;  ; <--- MUDADO (envia para stdout)
  error_log /dev/stderr;        ; <--- MUDADO (envia para stderr)
  
  sendfile        on;
  tcp_nopush      on;
  server_names_hash_bucket_size 128;
  server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    
    root /app/public; 
    
    add_header X-Content-Type-Options "nosniff";
    client_max_body_size 35M;
    index index.php;
    charset utf-8;
    
    location / {
      try_files $uri $uri/ /index.php?$query_string;
    }
    
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    
    error_page 404 /index.php;
    
    location ~ \\.php$ {
      fastcgi_pass 127.0.0.1:9000;
      fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
      include /etc/nginx/fastcgi_params;
    }
    
    location ~ /\\.(?!well-known).* {
      deny all;
    }
  }
}
"""

# 4. Worker do Supervisor para o Nginx (Corrigido)
"worker-nginx.conf" = """
[program:nginx]
command=nginx -g 'daemon off;' -c /etc/nginx/nginx.conf
autostart=true
autorestart=true
; --- LINHAS DE LOG REMOVIDAS (para herdar do supervisor) ---
"""

# 5. Worker do Supervisor para o PHP-FPM (Corrigido)
"worker-phpfpm.conf" = """
[program:php-fpm]
command=php-fpm -y /etc/php-fpm.conf -F
autostart=true
autorestart=true
; --- LINHAS DE LOG REMOVIDAS (para herdar do supervisor) ---
"""

# 6. Worker do Supervisor para as Queues do Laravel (Corrigido)
"worker-laravel.conf" = """
[program:worker-laravel]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work --sleep=3 --tries=3
autostart=true
autorestart=true
numprocs=4
; --- LINHAS DE LOG REMOVIDAS (para herdar do supervisor) ---
"""